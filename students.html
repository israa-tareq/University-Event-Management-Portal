<form id="studentForm" class="mb-4">

```

```

</form>

<h3>Student List</h3>

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Role</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="studentTable"></tbody>
</table>

     </footer>

    </div>
<script>
let students = [];
let editIndex = -1;

document.getElementById("studentForm").addEventListener("submit", function(e){
    e.preventDefault();

    let id = document.getElementById("studentId").value;
    let email = document.getElementById("email").value;
    let role = document.getElementById("role").value;

    if (editIndex === -1) {
        students.push({id, email, role});
    } else {
        students[editIndex] = {id, email, role};
        editIndex = -1;
    }

    displayStudents();
    this.reset();
});

function displayStudents(){
    let table = document.getElementById("studentTable");
    table.innerHTML = "";

    students.forEach((s, index) => {
        table.innerHTML += `
            <tr>
                <td>${s.id}</td>
                <td>${s.email}</td>
                <td>${s.role}</td>
                <td>
                    <button class="btn btn-warning btn-sm mr-2" onclick="editStudent(${index})">
                        Edit
                    </button>

                    <button class="btn btn-danger btn-sm" onclick="deleteStudent(${index})">
                        Delete
                    </button>
                </td>
            </tr>
        `;
    });
}

function deleteStudent(index){
    students.splice(index, 1);
    displayStudents();
}

function editStudent(index){
    let student = students[index];

    document.getElementById("studentId").value = student.id;
    document.getElementById("email").value = student.email;
    document.getElementById("role").value = student.role;

    editIndex = index;
}
</script>
